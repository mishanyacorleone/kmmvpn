services:
  postgres:
    image: postgres:16-alpine
    container_name: vpn_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vpnbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-vpnbot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vpnbot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: vpn_app
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-vpnbot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vpnbot}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - external
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${WEB_PORT:-8000}/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
  
  nginx:
    image: nginx:alpine
    container_name: vpn_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "8443:8443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/logs/nginx
    depends_on:
      - app
    networks:
      - external

volumes:
  postgres_data:
  nginx_logs:

networks:
  internal:
    driver: bridge
    internal: true # PostgreSQL недоступен снаружи
  external:
    driver: bridge
