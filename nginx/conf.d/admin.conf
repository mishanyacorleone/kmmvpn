# Админка на отдельном порту
# Снаружи доступна только через этот порт - можно закрыть ufw, если нужно
server {
    listen 8443;
    server_name _;

    # Жёсткий rate limiting для админки
    limit_req zone=general burst=10 nodelay;
    limit_conn conn_limit 5;

    # Заголовки безопасности
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "no-referrer";

    # Логин — особо жёсткий rate limit (5 попыток в минуту)
    location /admin/auth/login {
        limit_req zone=admin_login burst=3 nodelay;
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Все эндпоинты админки
    location /admin/ {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Всё остальное — закрыто
    location / {
        return 404;
    }
}
